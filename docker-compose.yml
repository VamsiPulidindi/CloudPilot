services:

  cloudpilot:
    container_name: cloudpilot

    build:
      context: .
      dockerfile: Dockerfile

    image: cloudpilot:latest

    restart: unless-stopped

    expose:
      - "3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data

    volumes:
      - cloudpilot-data:/app/data

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

    networks:
      - cloudpilot-network

  nginx:

    image: nginx:alpine

    container_name: cloudpilot-nginx

    depends_on:
      - cloudpilot

    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    networks:
      - cloudpilot-network



  prometheus:

    image: prom/prometheus:latest

    container_name: prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    networks:
      - cloudpilot-network

  grafana:
    image: grafana/grafana-oss:latest

    container_name: grafana

    restart: unless-stopped

    ports:
      - "3001:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123

    networks:
      - cloudpilot-network

  node-exporter:
    image: prom/node-exporter:latest

    container_name: node-exporter

    restart: unless-stopped

    ports:
      - "9100:9100"

    pid: host

    networks:
      - cloudpilot-network

volumes:
  cloudpilot-data:
  prometheus-data:
  grafana-data:

networks:
  cloudpilot-network:
    driver: bridge